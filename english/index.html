<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Умный тренажер по английскому языку</title>
  <style>
    :root {
      --bg-color: #fff0f3; /* Нежно-розовый фон */
      --main-teal: #008080; /* Морская волна */
      --dark-teal: #005a5a;
      --light-teal: #e6f2f2;
      --burgundy: #800000; /* Бордовый для деталей */
      --burgundy-hover: #b30000;
      --text-main: #4a4a4a;
      --white: #ffffff;
      --wrong-flash: rgba(214, 48, 49, 0.4); /* Вспышка ошибки */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      transition: background-color 0.3s ease;
    }

    body.wrong-answer {
      background-color: var(--wrong-flash);
    }

    /* Шапка с логотипом */
    header {
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      max-width: 1000px;
    }

    .logo-placeholder {
      width: 150px;
      height: 50px;
      border: 2px dashed var(--main-teal);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--main-teal);
      font-weight: bold;
      background-color: var(--white);
    }

    /* Основной контейнер */
    main {
      flex: 1;
      width: 100%;
      max-width: 650px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 128, 128, 0.1);
      border-top: 5px solid var(--main-teal);
      text-align: center;
    }

    /* Счётчик результатов */
    .score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 25px;
      font-size: 18px;
      font-weight: bold;
      color: var(--text-main);
    }

    .score-val {
      color: var(--burgundy);
    }

    .theme-indicator {
      display: inline-block;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      background-color: var(--light-teal);
      color: var(--main-teal);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .question-box {
      font-size: 26px;
      font-weight: bold;
      color: var(--text-main);
      margin: 25px 0;
      line-height: 1.4;
    }

    /* СТИЛИ ДЛЯ ВСПЛЫВАЮЩЕГО ОБЛАЧКА (ТУЛТИПА) */
    .tooltip-container {
      position: relative;
      display: inline-block;
      cursor: help;
    }

    .highlight-word {
      color: var(--burgundy);
      border-bottom: 3px dashed var(--burgundy);
      padding-bottom: 2px;
    }

    /* Само облачко */
    .tooltip-text {
      visibility: hidden;
      width: auto;
      min-width: 120px;
      max-width: 200px;
      background-color: var(--main-teal);
      color: var(--white);
      text-align: center;
      border-radius: 8px;
      padding: 6px 10px;
      position: absolute;
      z-index: 20;
      bottom: 125%; /* Показываем над словом */
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: normal;
      box-shadow: 0 5px 15px rgba(0, 128, 128, 0.2);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* Треугольник-стрелочка под облачком */
    .tooltip-text::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: var(--main-teal) transparent transparent transparent;
    }

    /* Поведение при наведении (десктоп) и фокусе (мобильные) */
    .tooltip-container:hover .tooltip-text,
    .tooltip-container:focus .tooltip-text {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    /* Сетка вариантов ответа */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 25px;
    }

    .option-btn {
      background-color: var(--white);
      border: 2px solid var(--main-teal);
      color: var(--main-teal);
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-btn:hover {
      background-color: var(--main-teal);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 128, 128, 0.15);
    }

    .option-btn:active {
      transform: translateY(0);
    }

    /* Canvas для конфетти */
    #confetti-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Подвал */
    footer {
      width: 100%;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: var(--main-teal);
      font-weight: 500;
    }

    @media (max-width: 500px) {
      .options-grid {
        grid-template-columns: 1fr;
      }
      .question-box {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <header>
    <div class="logo-placeholder">Логотип</div>
  </header>

  <main>
    <div id="trainer-screen" class="card">
      <div class="score-board">
        <div>Решено: <span id="total-count" class="score-val">0</span></div>
        <div>Правильно: <span id="correct-count" class="score-val">0</span></div>
      </div>
      
      <div class="theme-indicator" id="current-theme">Loading...</div>
      <div class="question-box" id="question-text">Creating the first challenge...</div>
      
      <div class="options-grid" id="options-container">
        <!-- Кнопки сгенерируются автоматически -->
      </div>
    </div>
  </main>

  <footer>
    Мастерская IT-обучения "Кот и Код"
  </footer>

  <script>
    // --- ЭФФЕКТ КОНФЕТТИ (CANVAS) ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confetti = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class ConfettiParticle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 20;
        this.size = Math.random() * 6 + 4;
        this.speedX = Math.random() * 4 - 2;
        this.speedY = -(Math.random() * 8 + 6);
        this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += 0.2;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function triggerConfetti() {
      confetti = [];
      for (let i = 0; i < 70; i++) {
        confetti.push(new ConfettiParticle());
      }
      animateConfetti();
    }

    let animationFrame;
    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach((p, index) => {
        p.update();
        p.draw();
        if (p.y > canvas.height + 10) {
          confetti.splice(index, 1);
        }
      });
      if (confetti.length > 0) {
        animationFrame = requestAnimationFrame(animateConfetti);
      } else {
        cancelAnimationFrame(animationFrame);
      }
    }

    // --- БАЗА ЗАДАНИЙ С ПОДСКАЗКАМИ-ПЕРЕВОДАМИ (50 ВОПРОСОВ) ---
    const questionDatabase = [
      // --- VERB TO BE ---
      { q: "I {brave} a brave pirate.", options: ["am", "is", "are"], correct: "am", theme: "Verb TO BE", translation: "brave — смелый" },
      { q: "She {best friend} my best friend.", options: ["is", "am", "are"], correct: "is", theme: "Verb TO BE", translation: "best friend — лучший друг" },
      { q: "They {happy family} happy family.", options: ["are", "is", "am"], correct: "are", theme: "Verb TO BE", translation: "happy family — счастливая семья" },
      { q: "{Ready} you ready for the game?", options: ["Are", "Is", "Am"], correct: "Are", theme: "Verb TO BE", translation: "ready — готовый" },
      { q: "The cute puppy {under} under the bed.", options: ["is", "are", "am"], correct: "is", theme: "Verb TO BE", translation: "under — под" },
      { q: "My toys {toys} in the box.", options: ["are", "is", "was"], correct: "are", theme: "Verb TO BE", translation: "toys — игрушки" },
      { q: "It {sunny} a sunny day today.", options: ["is", "am", "are"], correct: "is", theme: "Verb TO BE", translation: "sunny — солнечный" },
      { q: "We {clever} clever students.", options: ["are", "is", "am"], correct: "are", theme: "Verb TO BE", translation: "clever — умные" },
      { q: "Where {books} my books?", options: ["are", "is", "am"], correct: "are", theme: "Verb TO BE", translation: "books — книги" },
      { q: "He {teacher} not a doctor, he is a teacher.", options: ["is", "are", "am"], correct: "is", theme: "Verb TO BE", translation: "teacher — учитель" },

      // --- HAVE GOT / HAS GOT ---
      { q: "I {funny cat} a funny cat.", options: ["have got", "has got"], correct: "have got", theme: "Have got / Has got", translation: "funny cat — смешной кот" },
      { q: "Tim {bicycle} a big red bicycle.", options: ["has got", "have got"], correct: "has got", theme: "Have got / Has got", translation: "bicycle — велосипед" },
      { q: "We {many ideas} many ideas for our code.", options: ["have got", "has got"], correct: "have got", theme: "Have got / Has got", translation: "many ideas — много идей" },
      { q: "An elephant {long nose} a very long nose.", options: ["has got", "have got"], correct: "has got", theme: "Have got / Has got", translation: "long nose — длинный нос" },
      { q: "{Sister} you got a sister?", options: ["Have", "Has"], correct: "Have", theme: "Have got / Has got", translation: "sister — сестра" },
      { q: "She {green apples} got any green apples.", options: ["hasn't", "haven't"], correct: "hasn't", theme: "Have got / Has got", translation: "green apples — зеленые яблоки" },
      { q: "They {garden} a beautiful garden.", options: ["have got", "has got"], correct: "have got", theme: "Have got / Has got", translation: "garden — сад" },
      { q: "{Computer} she got a computer?", options: ["Has", "Have"], correct: "Has", theme: "Have got / Has got", translation: "computer — компьютер" },
      { q: "My monsters {teeth} got scary teeth.", options: ["have", "has"], correct: "have", theme: "Have got / Has got", translation: "teeth — зубы" },
      { q: "He {headache} got a headache today.", options: ["has", "have"], correct: "has", theme: "Have got / Has got", translation: "headache — головная боль" },

      // --- PRESENT SIMPLE ---
      { q: "He {every day} computer games every day.", options: ["plays", "play", "playing"], correct: "plays", theme: "Present Simple", translation: "every day — каждый день" },
      { q: "They {on foot} to school on foot.", options: ["go", "goes", "going"], correct: "go", theme: "Present Simple", translation: "on foot — пешком" },
      { q: "{Ice cream} you like ice cream?", options: ["Do", "Does", "Are"], correct: "Do", theme: "Present Simple", translation: "ice cream — мороженое" },
      { q: "She {coffee} not drink coffee.", options: ["does", "do", "is"], correct: "does", theme: "Present Simple", translation: "coffee — кофе" },
      { q: "My sister {very well} English very well.", options: ["speaks", "speak", "speaking"], correct: "speaks", theme: "Present Simple", translation: "very well — очень хорошо" },
      { q: "Where {live} they live?", options: ["do", "does", "are"], correct: "do", theme: "Present Simple", translation: "live — жить" },
      { q: "The sun {sun} in the east.", options: ["rises", "rise", "rising"], correct: "rises", theme: "Present Simple", translation: "sun — солнце" },
      { q: "We often {grandparents} our grandparents.", options: ["visit", "visits", "visiting"], correct: "visit", theme: "Present Simple", translation: "grandparents — бабушка и дедушка" },
      { q: "{Drive} your dad drive a car?", options: ["Does", "Do", "Is"], correct: "Does", theme: "Present Simple", translation: "drive — водить" },
      { q: "Cats {love} milk.", options: ["love", "loves", "loving"], correct: "love", theme: "Present Simple", translation: "love — любить" },

      // --- PRESENT CONTINUOUS ---
      { q: "Look! The birds {sky} in the sky.", options: ["are flying", "is flying", "fly"], correct: "are flying", theme: "Present Continuous", translation: "sky — небо" },
      { q: "I {homework} my homework right now.", options: ["am doing", "is doing", "do"], correct: "am doing", theme: "Present Continuous", translation: "homework — домашняя работа" },
      { q: "Listen! She {song} a nice song.", options: ["is singing", "are singing", "sings"], correct: "is singing", theme: "Present Continuous", translation: "song — песня" },
      { q: "{At the moment} they writing a code at the moment?", options: ["Are", "Is", "Do"], correct: "Are", theme: "Present Continuous", translation: "at the moment — в данный момент" },
      { q: "He {sleeping} not sleeping, he is reading.", options: ["is", "are", "am"], correct: "is", theme: "Present Continuous", translation: "sleeping — спит" },
      { q: "What {drawing} you drawing now?", options: ["are", "is", "do"], correct: "are", theme: "Present Continuous", translation: "drawing — рисуешь" },
      { q: "We {funny movie} a funny movie at the moment.", options: ["are watching", "is watching", "watch"], correct: "are watching", theme: "Present Continuous", translation: "funny movie — смешной фильм" },
      { q: "The baby {crying} in the bed right now.", options: ["is crying", "are crying", "cries"], correct: "is crying", theme: "Present Continuous", translation: "crying — плачет" },
      { q: "It {outside} outside. Take your umbrella!", options: ["is raining", "are raining", "rains"], correct: "is raining", theme: "Present Continuous", translation: "outside — на улице" },
      { q: "Why {crying} she crying?", options: ["is", "are", "do"], correct: "is", theme: "Present Continuous", translation: "crying — плачет" },

      // --- VOCABULARY ---
      { q: "Как переводится слово: {Cabbage}?", options: ["Капуста", "Огурец", "Тыква", "Морковь"], correct: "Капуста", theme: "Vocabulary", translation: "Просто наведи на варианты!" },
      { q: "Выбери перевод слова: {Черепаха}?", options: ["Turtle", "Frog", "Lizard", "Spider"], correct: "Turtle", theme: "Vocabulary", translation: "Подсказка в вариантах :)" },
      { q: "Как переводится слово: {Thursday}?", options: ["Четверг", "Вторник", "Суббота", "Пятница"], correct: "Четверг", theme: "Vocabulary", translation: "Один из дней недели!" },
      { q: "Выбери правильный перевод: {Сентябрь}?", options: ["September", "October", "November", "December"], correct: "September", theme: "Vocabulary", translation: "Первый осенний месяц" },
      { q: "Что это за часть тела: {Shoulders}?", options: ["Плечи", "Колени", "Пальцы", "Локти"], correct: "Плечи", theme: "Vocabulary", translation: "Часть тела выше груди" },
      { q: "Как переводится: {Kitchen}?", options: ["Кухня", "Спальня", "Гостиная", "Ванная"], correct: "Кухня", theme: "Vocabulary", translation: "Место, где готовят еду" },
      { q: "Выбери слово, означающее {Снежный}?", options: ["Snowy", "Rainy", "Windy", "Sunny"], correct: "Snowy", theme: "Vocabulary", translation: "Когда на улице много снега" },
      { q: "Как переводится слово: {Pineapple}?", options: ["Ананас", "Яблоко", "Груша", "Апельсин"], correct: "Ананас", theme: "Vocabulary", translation: "Pine (сосна) + Apple (яблоко)" },
      { q: "Найди лишнее слово в группе одежды: {Bread}?", options: ["Bread", "T-shirt", "Jeans", "Jacket"], correct: "Bread", theme: "Vocabulary", translation: "Это точно едят, а не носят!" },
      { q: "Как по-английски пишется {Карандаш}?", options: ["Pencil", "Pen", "Ruler", "Book"], correct: "Pencil", theme: "Vocabulary", translation: "Им часто рисуют в школе" }
    ];

    // --- УМНЫЙ АЛГОРИТМ ПЕРЕМЕШИВАНИЯ (ФИШЕР-ЙЕТС) ---
    let shuffledQueue = [];
    let queueIndex = 0;
    
    let scoreTotal = 0;
    let scoreCorrect = 0;
    let currentQuestion = null;

    function shuffleArray(array) {
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function initTrainer() {
      shuffledQueue = shuffleArray(questionDatabase);
      queueIndex = 0;
      generateQuestion();
    }

    // Вспомогательная функция для форматирования вопроса с тултипом
    // Находит в строке фигурные скобки {слово} и превращает их в интерактивный тултип
    function formatQuestionText(text, translation) {
      const regex = /\{([^}]+)\}/g;
      return text.replace(regex, (match, word) => {
        return `
          <span class="tooltip-container" tabindex="0">
            <span class="highlight-word">${word}</span>
            <span class="tooltip-text">${translation}</span>
          </span>
        `;
      });
    }

    function generateQuestion() {
      if (queueIndex >= shuffledQueue.length) {
        shuffledQueue = shuffleArray(questionDatabase);
        queueIndex = 0;
      }

      currentQuestion = shuffledQueue[queueIndex];
      queueIndex++;

      // Заполнение данных
      document.getElementById('current-theme').textContent = currentQuestion.theme;
      
      // Форматируем текст вопроса, внедряя тултип на место фигурных скобок
      const formattedText = formatQuestionText(currentQuestion.q, currentQuestion.translation);
      document.getElementById('question-text').innerHTML = formattedText;

      const container = document.getElementById('options-container');
      container.innerHTML = '';

      currentQuestion.options.forEach(option => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        button.textContent = option;
        button.onclick = () => checkAnswer(option);
        container.appendChild(button);
      });
    }

    function checkAnswer(selectedOption) {
      scoreTotal++;

      if (selectedOption === currentQuestion.correct) {
        scoreCorrect++;
        triggerConfetti();
      } else {
        document.body.classList.add('wrong-answer');
        setTimeout(() => {
          document.body.classList.remove('wrong-answer');
        }, 500);
      }

      document.getElementById('total-count').textContent = scoreTotal;
      document.getElementById('correct-count').textContent = scoreCorrect;

      generateQuestion();
    }

    window.onload = initTrainer;
  </script>
</body>
</html>
