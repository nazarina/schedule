<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Умный тренажер по английскому языку</title>
  <style>
    :root {
      --bg-color: #fff0f3; /* Нежно-розовый фон */
      --main-teal: #008080; /* Морская волна */
      --dark-teal: #005a5a;
      --light-teal: #e6f2f2;
      --burgundy: #800000; /* Бордовый для акцентов */
      --burgundy-hover: #b30000;
      --text-main: #4a4a4a;
      --white: #ffffff;
      --wrong-flash: rgba(214, 48, 49, 0.4); /* Вспышка ошибки */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      transition: background-color 0.3s ease;
    }

    body.wrong-answer {
      background-color: var(--wrong-flash);
    }

    /* Шапка с логотипом */
    header {
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      max-width: 1000px;
    }

      .logo-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--main-teal);
      font-weight: bold;
    }

    /* Основной контейнер */
    main {
      flex: 1;
      width: 100%;
      max-width: 650px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 128, 128, 0.1);
      border-top: 5px solid var(--main-teal);
      text-align: center;
    }

    /* Счётчик результатов */
    .score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 25px;
      font-size: 18px;
      font-weight: bold;
      color: var(--text-main);
    }

    .score-val {
      color: var(--burgundy);
    }

    .theme-indicator {
      display: inline-block;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      background-color: var(--light-teal);
      color: var(--main-teal);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    /* Контейнер вопроса */
    .question-box {
      font-size: 26px;
      font-weight: bold;
      color: var(--text-main);
      margin: 25px 0;
      line-height: 1.8;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    /* Обозначение пропущенного слова */
    .gap-placeholder {
      display: inline-block;
      min-width: 80px;
      border-bottom: 3px solid var(--burgundy);
      color: var(--burgundy);
      text-align: center;
      margin: 0 5px;
      font-style: italic;
    }

    /* СТИЛИ ДЛЯ ВСПЛЫВАЮЩЕГО ОБЛАЧКА (ТУЛТИПА) */
    .tooltip-container {
      position: relative;
      display: inline-block;
      cursor: help;
    }

    .highlight-word {
      color: var(--text-main);
      border-bottom: 1px dashed #b2bec3;
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tooltip-container:hover .highlight-word {
      color: var(--main-teal);
      border-bottom-color: var(--main-teal);
    }

    /* Само облачко */
    .tooltip-text {
      visibility: hidden;
      width: auto;
      white-space: nowrap;
      background-color: var(--main-teal);
      color: var(--white);
      text-align: center;
      border-radius: 6px;
      padding: 5px 10px;
      position: absolute;
      z-index: 20;
      bottom: 130%; /* Над словом */
      left: 50%;
      transform: translateX(-50%) translateY(5px);
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 5px 15px rgba(0, 128, 128, 0.2);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
    }

    /* Треугольник-стрелочка под облачком */
    .tooltip-text::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: var(--main-teal) transparent transparent transparent;
    }

    /* Поведение при наведении и фокусе */
    .tooltip-container:hover .tooltip-text,
    .tooltip-container:focus .tooltip-text {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Сетка вариантов ответа */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 25px;
    }

    .option-btn {
      background-color: var(--white);
      border: 2px solid var(--main-teal);
      color: var(--main-teal);
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-btn:hover {
      background-color: var(--main-teal);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 128, 128, 0.15);
    }

    .option-btn:active {
      transform: translateY(0);
    }

    /* Canvas для конфетти */
    #confetti-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Подвал */
    footer {
      width: 100%;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: var(--main-teal);
      font-weight: 500;
    }

    @media (max-width: 500px) {
      .options-grid {
        grid-template-columns: 1fr;
      }
      .question-box {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

<header>
    <div class="logo-placeholder"><img src="logo.png" width="100px"></div>
  </header>

  <main>
    <div id="trainer-screen" class="card">
      <div class="score-board">
        <div>Решено: <span id="total-count" class="score-val">0</span></div>
        <div>Правильно: <span id="correct-count" class="score-val">0</span></div>
      </div>
      
      <div class="theme-indicator" id="current-theme">Загрузка...</div>
      <div class="question-box" id="question-text">Создаем задание...</div>
      
      <div class="options-grid" id="options-container">
        <!-- Кнопки сгенерируются автоматически -->
      </div>
    </div>
  </main>

  <footer>
    Мастерская IT-обучения "Кот и Код"
  </footer>

  <script>
    // --- ЭФФЕКТ КОНФЕТТИ ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confetti = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class ConfettiParticle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 20;
        this.size = Math.random() * 6 + 4;
        this.speedX = Math.random() * 4 - 2;
        this.speedY = -(Math.random() * 8 + 6);
        this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += 0.2;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function triggerConfetti() {
      confetti = [];
      for (let i = 0; i < 70; i++) {
        confetti.push(new ConfettiParticle());
      }
      animateConfetti();
    }

    let animationFrame;
    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach((p, index) => {
        p.update();
        p.draw();
        if (p.y > canvas.height + 10) {
          confetti.splice(index, 1);
        }
      });
      if (confetti.length > 0) {
        animationFrame = requestAnimationFrame(animateConfetti);
      } else {
        cancelAnimationFrame(animationFrame);
      }
    }

    // --- ВСТРОЕННЫЙ СЛОВАРЬ ДЛЯ АВТОМАТИЧЕСКОГО ПЕРЕВОДА ЛЮБОГО СЛОВА ---
    const dictionary = {

      "toys": "игрушки", "box": "коробка", "sunny": "солнечный", "day": "день",
      "today": "сегодня", "clever": "умный", "students": "ученики", "books": "книги",
      "teacher": "учитель", "doctor": "доктор", "funny": "смешной", "cat": "кот",
      "big": "большой", "red": "красный", "bicycle": "велосипед", "many": "много",

      "monsters": "монстры", "scary": "страшные", "teeth": "зубы", "headache": "головная боль",

      "ice": "лед", "cream": "крем (ice cream - мороженое)", "coffee": "кофе",

      "movie": "фильм", "baby": "малыш", "outside": "снаружи / на улице", "umbrella": "зонтик",

      // Тесты лексики (русские слова-вопросы не переводятся поштучно, для них сделаем исключение)
      "как": "слово-вопрос", "переводится": "переводится", "слово": "слово", "выбери": "выбери",
      "правильный": "правильный", "перевод": "перевод", "что": "что", "это": "это", "за": "за",
      "часть": "часть", "тела": "тела", "найди": "найди", "лишнее": "лишнее", "в": "в",
      "группе": "группе", "одежды": "одежды", "по-английски": "по-английски", "пишется": "пишется",
      "cabbage": "капуста", "черепаха": "turtle", "thursday": "четверг", "сентябрь": "september",
      "shoulders": "плечи", "kitchen": "кухня", "снежный": "snowy", "pineapple": "ананас",
      "bread": "хлеб", "карандаш": "pencil"
    };

    // Функция перевода слова
    function getTranslation(word) {
      // Очищаем слово от знаков препинания для поиска в словаре
      const cleanWord = word.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g, "");
      return dictionary[cleanWord] || "Перевод не найден";
    }

    // --- БАЗА ЗАДАНИЙ (Знак ___ показывает место пропуска) ---
    const questionDatabase = [
      // --- VERB TO BE ---
      { q: "I ___ a brave pirate.", options: ["am", "is", "are"], correct: "am", theme: "Verb TO BE" },
      { q: "She ___ my best friend.", options: ["is", "am", "are"], correct: "is", theme: "Verb TO BE" },
      { q: "They ___ a happy family.", options: ["are", "is", "am"], correct: "are", theme: "Verb TO BE" },
      { q: "___ you ready for the game?", options: ["Are", "Is", "Am"], correct: "Are", theme: "Verb TO BE" },
      { q: "The cute puppy ___ under the bed.", options: ["is", "are", "am"], correct: "is", theme: "Verb TO BE" },
      { q: "My toys ___ in the box.", options: ["are", "is", "was"], correct: "are", theme: "Verb TO BE" },
      { q: "It ___ a sunny day today.", options: ["is", "am", "are"], correct: "is", theme: "Verb TO BE" },
      { q: "We ___ clever students.", options: ["are", "is", "am"], correct: "are", theme: "Verb TO BE" },
      { q: "Where ___ my books?", options: ["are", "is", "am"], correct: "are", theme: "Verb TO BE" },
      { q: "He ___ not a doctor, he is a teacher.", options: ["is", "are", "am"], correct: "is", theme: "Verb TO BE" },

      // --- HAVE GOT / HAS GOT ---
      { q: "I ___ a funny cat.", options: ["have got", "has got"], correct: "have got", theme: "Have got / Has got" },
      { q: "Tim ___ a big red bicycle.", options: ["has got", "have got"], correct: "has got", theme: "Have got / Has got" },
      { q: "We ___ many ideas for our code.", options: ["have got", "has got"], correct: "have got", theme: "Have got / Has got" },
      { q: "An elephant ___ a very long nose.", options: ["has got", "have got"], correct: "has got", theme: "Have got / Has got" },
      { q: "___ you got a sister?", options: ["Have", "Has"], correct: "Have", theme: "Have got / Has got" },
      { q: "She ___ got any green apples.", options: ["hasn't", "haven't"], correct: "hasn't", theme: "Have got / Has got" },
      { q: "They ___ a beautiful garden.", options: ["have got", "has got"], correct: "have got", theme: "Have got / Has got" },
      { q: "___ she got a computer?", options: ["Has", "Have"], correct: "Has", theme: "Have got / Has got" },
      { q: "My monsters ___ got scary teeth.", options: ["have", "has"], correct: "have", theme: "Have got / Has got" },
      { q: "He ___ got a headache today.", options: ["has", "have"], correct: "has", theme: "Have got / Has got" },

      // --- PRESENT SIMPLE ---
      { q: "He ___ computer games every day.", options: ["plays", "play", "playing"], correct: "plays", theme: "Present Simple" },

      // --- VOCABULARY ---
      { q: "Как переводится слово: ___ (Cabbage)?", options: ["Капуста", "Огурец", "Тыква", "Морковь"], correct: "Капуста", theme: "Vocabulary" },

      { q: "Выбери правильный перевод: ___ (Сентябрь)?", options: ["September", "October", "November", "December"], correct: "September", theme: "Vocabulary" },
      { q: "Что это за часть тела: ___ (Shoulders)?", options: ["Плечи", "Колени", "Пальцы", "Локти"], correct: "Плечи", theme: "Vocabulary" },

      { q: "Выбери слово, означающее ___ (Снежный)?", options: ["Snowy", "Rainy", "Windy", "Sunny"], correct: "Snowy", theme: "Vocabulary" },
      { q: "Как переводится слово: ___ (Pineapple)?", options: ["Ананас", "Яблоко", "Груша", "Апельсин"], correct: "Ананас", theme: "Vocabulary" },
      { q: "Найди лишнее слово в группе одежды: ___ (Bread)?", options: ["Bread", "T-shirt", "Jeans", "Jacket"], correct: "Bread", theme: "Vocabulary" },
      { q: "Как по-английски пишется ___ (Карандаш)?", options: ["Pencil", "Pen", "Ruler", "Book"], correct: "Pencil", theme: "Vocabulary" }
    ];

    let shuffledQueue = [];
    let queueIndex = 0;
    let scoreTotal = 0;
    let scoreCorrect = 0;
    let currentQuestion = null;

    function shuffleArray(array) {
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function initTrainer() {
      shuffledQueue = shuffleArray(questionDatabase);
      queueIndex = 0;
      generateQuestion();
    }

    // РАЗБИВАЕТ ПРЕДЛОЖЕНИЕ НА СЛОВА И ОБОРАЧИВАЕТ КАЖДОЕ В ТУЛТИП С ПЕРЕВОДОМ
    function formatTextWithInteractiveWords(text) {
      const words = text.split(" ");
      return words.map(word => {
        // Если это пропуск, возвращаем красивую заглушку
        if (word === "___") {
          return `<span class="gap-placeholder">?</span>`;
        }
        
        const cleanWordForDict = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g, "");
        const translation = getTranslation(cleanWordForDict);

        // Если перевод не найден (например, знаки препинания), оставляем просто текст
        if (translation === "Перевод не найден" || !cleanWordForDict) {
          return `<span>${word}</span>`;
        }

        return `
          <span class="tooltip-container" tabindex="0">
            <span class="highlight-word">${word}</span>
            <span class="tooltip-text">${translation}</span>
          </span>
        `;
      }).join(" ");
    }

    function generateQuestion() {
      if (queueIndex >= shuffledQueue.length) {
        shuffledQueue = shuffleArray(questionDatabase);
        queueIndex = 0;
      }

      currentQuestion = shuffledQueue[queueIndex];
      queueIndex++;

      document.getElementById('current-theme').textContent = currentQuestion.theme;
      
      // Генерация текста с интерактивным переводом слов
      const formattedHTML = formatTextWithInteractiveWords(currentQuestion.q);
      document.getElementById('question-text').innerHTML = formattedHTML;

      const container = document.getElementById('options-container');
      container.innerHTML = '';

      currentQuestion.options.forEach(option => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        button.textContent = option;
        button.onclick = () => checkAnswer(option);
        container.appendChild(button);
      });
    }

    function checkAnswer(selectedOption) {
      scoreTotal++;

      if (selectedOption === currentQuestion.correct) {
        scoreCorrect++;
        triggerConfetti();
      } else {
        document.body.classList.add('wrong-answer');
        setTimeout(() => {
          document.body.classList.remove('wrong-answer');
        }, 500);
      }

      document.getElementById('total-count').textContent = scoreTotal;
      document.getElementById('correct-count').textContent = scoreCorrect;

      generateQuestion();
    }

    window.onload = initTrainer;
  </script>
</body>
</html>
