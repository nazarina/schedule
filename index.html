<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой План на День</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #334e68;
            --accent-color: #6200ee;
            --success-color: #4caf50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent-color);
        }
        .schedule-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .task-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            border: 2px solid transparent;
        }
        .task-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .task-icon {
            font-size: 32px;
            width: 45px;
            text-align: center;
        }
        .task-text {
            font-size: 18px;
            font-weight: 600;
            transition: color 0.3s;
        }
        .checkbox-wrapper {
            width: 30px;
            height: 30px;
            border: 3px solid #bcccdc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: #fff;
        }
        .checkbox-wrapper::after {
            content: '✓';
            font-size: 18px;
            color: white;
            display: none;
            font-weight: bold;
        }
        .task-card.done {
            background-color: #e2e8f0;
            opacity: 0.6;
            transform: scale(0.98);
            box-shadow: none;
        }
        .task-card.done .task-text {
            text-decoration: line-through;
            color: #627d98;
        }
        .task-card.done .checkbox-wrapper {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }
        .task-card.done .checkbox-wrapper::after {
            display: block;
        }
        .reset-btn {
            margin-top: 25px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: opacity 0.2s;
        }
        .reset-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>📝 Мои Задачи</h1>
    <div class="schedule-container">
        
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">🛏️</div>
                <div class="task-text">Заправить кровать</div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
       
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">➗</div>
                <div class="task-text"><a href="https://nazarina.github.io/schedule/math/index.html" target="_blank">Математика</a></div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">✍️</div>
                <div class="task-text"><a href="https://nazarina.github.io/schedule/russian/grammatical-case/index.html" target="_blank">Русский язык</a></div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">🇬🇧</div>
                <div class="task-text"><a href="https://nazarina.github.io/schedule/english/ps-pc/index.html" target="_blank">Английский язык</a></div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">🌍</div>
                <div class="task-text"><a href="https://rutube.ru/channel/779886/videos/" target="_blank">Окружающий мир</a></div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">🧹</div>
                <div class="task-text">Домашние дела</div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">🏀</div>
                <div class="task-text">Спорт / Тренировка</div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
        <div class="task-card" onclick="toggleTask(this)">
            <div class="task-left">
                <div class="task-icon">📖</div>
                <div class="task-text">Литература</div>
            </div>
            <div class="checkbox-wrapper"></div>
        </div>
    </div>
    <button class="reset-btn" onclick="resetAll()">🔄 Начать новый день</button>
    <script>
        function toggleTask(card) {
            card.classList.toggle('done');
        }
        function resetAll() {
            const cards = document.querySelectorAll('.task-card');
            cards.forEach(card => card.classList.remove('done'));
        }
    </script>
</body>
</html>
