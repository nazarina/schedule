<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Умный тренажер по русскому языку</title>
  <style>
    :root {
      --bg-color: #d4f6fa;
      --main-teal: #008080; /* Морская волна */
      --dark-teal: #005a5a;
      --light-teal: #e6f2f2;
      --burgundy: #800000; /* Бордовый для деталей */
      --burgundy-hover: #b30000;
      --text-main: #4a4a4a;
      --white: #ffffff;
      --wrong-flash: rgba(214, 48, 49, 0.4); /* Красная вспышка */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      transition: background-color 0.3s ease;
    }
      h1 {
      color:var(--main-teal);
          font-size: 52px;
    text-align: center;
    margin-bottom: 100px;
    }

    body.wrong-answer {
      background-color: var(--wrong-flash);
    }

    /* Шапка с логотипом */
    header {
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      max-width: 1000px;
    }

    .logo-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
   
    }

    /* Основной контейнер */
    main {
      flex: 1;
      width: 100%;
      max-width: 650px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 128, 128, 0.1);
      border-top: 5px solid var(--main-teal);
      text-align: center;
    }

    /* Счётчик результатов */
    .score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 25px;
      font-size: 18px;
      font-weight: bold;
      color: var(--text-main);
    }

    .score-val {
      color: var(--burgundy);
    }

    .theme-indicator {
      display: inline-block;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      background-color: var(--light-teal);
      color: var(--main-teal);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .help {
       font-size: 14px;
       color: var(--main-teal);
      text-align: center;
      margin-top:50px;
    }

    .question-box {
      font-size: 26px;
      font-weight: bold;
      color: var(--text-main);
      margin: 25px 0;
      line-height: 1.4;
    }

    .highlight-word {
      color: var(--burgundy);
      border-bottom: 3px dashed var(--burgundy);
      padding-bottom: 2px;
    }

    /* Сетка вариантов ответа */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 25px;
    }

    .option-btn {
      background-color: var(--white);
      border: 2px solid var(--main-teal);
      color: var(--main-teal);
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-btn:hover {
      background-color: var(--main-teal);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 128, 128, 0.15);
    }

    .option-btn:active {
      transform: translateY(0);
    }

    /* Canvas для конфетти */
    #confetti-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Подвал */
    footer {
      width: 100%;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: var(--main-teal);
      font-weight: 500;
    }

    @media (max-width: 500px) {
      .options-grid {
        grid-template-columns: 1fr;
      }
      .question-box {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

 <header>
    <div class="logo-placeholder"><img src="logo.png" width="100px"></div>
  </header>

  <main>
    <h1>Тренажер по русскому языку</h1>
    <div id="trainer-screen" class="card">
      <div class="score-board">
        <div>Решено: <span id="total-count" class="score-val">0</span></div>
        <div>Правильно: <span id="correct-count" class="score-val">0</span></div>
      </div>
      
      <div class="theme-indicator" id="current-theme">Загрузка...</div>
      <div class="question-box" id="question-text">Придумываем первый вопрос...</div>
      
      <div class="options-grid" id="options-container">
        <!-- Кнопки сгенерируются автоматически -->
      </div>
     
    </div>
     <p class="help"><a href="">Подсказка</a></p>
  </main>

  <footer>
    Мастерская IT-обучения "Кот и Код"
  </footer>

  <script>
    // --- ЭФФЕКТ КОНФЕТТИ (CANVAS) ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confetti = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class ConfettiParticle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 20;
        this.size = Math.random() * 6 + 4;
        this.speedX = Math.random() * 4 - 2;
        this.speedY = -(Math.random() * 8 + 6);
        this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += 0.2;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function triggerConfetti() {
      confetti = [];
      for (let i = 0; i < 70; i++) {
        confetti.push(new ConfettiParticle());
      }
      animateConfetti();
    }

    let animationFrame;
    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach((p, index) => {
        p.update();
        p.draw();
        if (p.y > canvas.height + 10) {
          confetti.splice(index, 1);
        }
      });
      if (confetti.length > 0) {
        animationFrame = requestAnimationFrame(animateConfetti);
      } else {
        cancelAnimationFrame(animationFrame);
      }
    }

    // --- РАСШИРЕННАЯ БАЗА ВОПРОСОВ ---
    const questionDatabase = [
      // --- ПАДЕЖИ ---
      { q: "Определи падеж: Радоваться <span class='highlight-word'>весне</span>", options: ["Дательный", "Творительный", "Родительный", "Предложный"], correct: "Дательный", theme: "Падежи" },
      { q: "Определи падеж: Написать в <span class='highlight-word'>тетради</span>", options: ["Предложный", "Дательный", "Родительный", "Винительный"], correct: "Предложный", theme: "Падежи" },
      { q: "Определи падеж: Гордиться <span class='highlight-word'>победой</span>", options: ["Творительный", "Именительный", "Дательный", "Родительный"], correct: "Творительный", theme: "Падежи" },
      { q: "Определи падеж: Нет <span class='highlight-word'>времени</span>", options: ["Родительный", "Дательный", "Винительный", "Именительный"], correct: "Родительный", theme: "Падежи" },
      { q: "Определи падеж: Вижу <span class='highlight-word'>солнце</span>", options: ["Винительный", "Именительный", "Родительный", "Творительный"], correct: "Винительный", theme: "Падежи" },
      { q: "Определи падеж: Спрятаться под <span class='highlight-word'>зонтом</span>", options: ["Творительный", "Родительный", "Дательный", "Винительный"], correct: "Творительный", theme: "Падежи" },
      { q: "Определи падеж: Выйти из <span class='highlight-word'>класса</span>", options: ["Родительный", "Дательный", "Предложный", "Именительный"], correct: "Родительный", theme: "Падежи" },
      { q: "Определи падеж: <span class='highlight-word'>Книга</span> лежит на столе", options: ["Именительный", "Винительный", "Родительный", "Дательный"], correct: "Именительный", theme: "Падежи" },
      { q: "Определи падеж: Мечтать о <span class='highlight-word'>путешествии</span>", options: ["Предложный", "Родительный", "Дательный", "Творительный"], correct: "Предложный", theme: "Падежи" },
      { q: "Определи падеж: Купить <span class='highlight-word'>билет</span> на поезд", options: ["Винительный", "Именительный", "Родительный", "Творительный"], correct: "Винительный", theme: "Падежи" },
      { q: "Определи падеж: Подарить <span class='highlight-word'>маме</span> цветы", options: ["Дательный", "Творительный", "Винительный", "Предложный"], correct: "Дательный", theme: "Падежи" },
      { q: "Определи падеж: Запах <span class='highlight-word'>хлеба</span>", options: ["Родительный", "Дательный", "Винительный", "Творительный"], correct: "Родительный", theme: "Падежи" },
      { q: "Определи падеж: Любоваться <span class='highlight-word'>морем</span>", options: ["Творительный", "Предложный", "Винительный", "Родительный"], correct: "Творительный", theme: "Падежи" },
      { q: "Определи падеж: Рассказать о <span class='highlight-word'>друге</span>", options: ["Предложный", "Дательный", "Винительный", "Именительный"], correct: "Предложный", theme: "Падежи" },
      { q: "Определи падеж: Письмо от <span class='highlight-word'>дедушки</span>", options: ["Родительный", "Дательный", "Винительный", "Предложный"], correct: "Родительный", theme: "Падежи" },

      // --- ЧАСТИ РЕЧИ ---
      { q: "Какая часть речи: <span class='highlight-word'>Бежать</span>", options: ["Глагол", "Существительное", "Прилагательное", "Местоимение"], correct: "Глагол", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Красивый</span>", options: ["Прилагательное", "Существительное", "Глагол", "Наречие"], correct: "Прилагательное", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Радость</span>", options: ["Существительное", "Прилагательное", "Глагол", "Предлог"], correct: "Существительное", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Быстро</span>", options: ["Наречие", "Глагол", "Прилагательное", "Существительное"], correct: "Наречие", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Я</span>", options: ["Местоимение", "Существительное", "Союз", "Предлог"], correct: "Местоимение", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Зеленеет</span>", options: ["Глагол", "Прилагательное", "Существительное", "Наречие"], correct: "Глагол", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Одиннадцать</span>", options: ["Числительное", "Существительное", "Местоимение", "Прилагательное"], correct: "Числительное", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Под</span> деревом", options: ["Предлог", "Союз", "Частица", "Местоимение"], correct: "Предлог", theme: "Части речи" },
      { q: "Какая часть речи: Кот <span class='highlight-word'>и</span> собака", options: ["Союз", "Предлог", "Частица", "Местоимение"], correct: "Союз", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Громкий</span>", options: ["Прилагательное", "Наречие", "Существительное", "Глагол"], correct: "Прилагательное", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Тишина</span>", options: ["Существительное", "Глагол", "Прилагательное", "Наречие"], correct: "Существительное", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Весело</span>", options: ["Наречие", "Прилагательное", "Глагол", "Союз"], correct: "Наречие", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Ты</span>", options: ["Местоимение", "Существительное", "Предлог", "Числительное"], correct: "Местоимение", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Пятый</span>", options: ["Числительное", "Прилагательное", "Местоимение", "Существительное"], correct: "Числительное", theme: "Части речи" },
      { q: "Какая часть речи: <span class='highlight-word'>Улыбка</span>", options: ["Существительное", "Глагол", "Прилагательное", "Наречие"], correct: "Существительное", theme: "Части речи" },

      // --- ОРФОГРАММЫ ---
      { q: "Вставь букву: ш..рокий", options: ["и", "ы"], correct: "и", theme: "Орфограммы" },
      { q: "Вставь букву: со(?)нце", options: ["л", "Без буквы"], correct: "л", theme: "Орфограммы" },
      { q: "Вставь букву: прелес(?)ный", options: ["т", "Без буквы"], correct: "т", theme: "Орфограммы" },
      { q: "Вставь букву: зв..зда", options: ["е", "и"], correct: "е", theme: "Орфограммы" },
      { q: "Вставь букву: ду(б/п)?", options: ["б", "п"], correct: "б", theme: "Орфограммы" },
      { q: "Вставь букву: под..езд", options: ["ъ", "ь"], correct: "ъ", theme: "Орфограммы" },
      { q: "Вставь букву: т..жёлый", options: ["я", "е"], correct: "я", theme: "Орфограммы" },
      { q: "Вставь букву: замер..зать", options: ["е", "и"], correct: "е", theme: "Орфограммы" },
      { q: "Вставь букву: чу..ство", options: ["в", "Без буквы"], correct: "в", theme: "Орфограммы" },
      { q: "Вставь букву: пас(?)бище", options: ["т", "Без буквы"], correct: "т", theme: "Орфограммы" },
      { q: "Вставь букву: опас(?)ный", options: ["Без буквы", "т"], correct: "Без буквы", theme: "Орфограммы" },
      { q: "Вставь букву: лё..кий", options: ["г", "х"], correct: "г", theme: "Орфограммы" },
      { q: "Вставь букву: мя..кий", options: ["г", "х"], correct: "г", theme: "Орфограммы" },
      { q: "Вставь букву: в..юга", options: ["ь", "ъ"], correct: "ь", theme: "Орфограммы" },
      { q: "Вставь букву: ч..шка", options: ["а", "я"], correct: "а", theme: "Орфограммы" }
    ];

    // --- УМНЫЙ АЛГОРИТМ ПЕРЕМЕШИВАНИЯ БЕЗ ПОВТОРОВ ---
    let shuffledQueue = [];
    let queueIndex = 0;
    
    let scoreTotal = 0;
    let scoreCorrect = 0;
    let currentQuestion = null;

    // Перемешивание Фишера-Йетса
    function shuffleArray(array) {
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function initTrainer() {
      shuffledQueue = shuffleArray(questionDatabase);
      queueIndex = 0;
      generateQuestion();
    }

    function generateQuestion() {
      // Если все вопросы из очереди закончились, перемешиваем заново
      if (queueIndex >= shuffledQueue.length) {
        shuffledQueue = shuffleArray(questionDatabase);
        queueIndex = 0;
      }

      currentQuestion = shuffledQueue[queueIndex];
      queueIndex++;

      // Отрисовка
      document.getElementById('current-theme').textContent = currentQuestion.theme;
      document.getElementById('question-text').innerHTML = currentQuestion.q;

      const container = document.getElementById('options-container');
      container.innerHTML = '';

      // Генерируем варианты ответов
      currentQuestion.options.forEach(option => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        button.textContent = option;
        button.onclick = () => checkAnswer(option);
        container.appendChild(button);
      });
    }

    function checkAnswer(selectedOption) {
      scoreTotal++;

      if (selectedOption === currentQuestion.correct) {
        scoreCorrect++;
        triggerConfetti();
      } else {
        document.body.classList.add('wrong-answer');
        setTimeout(() => {
          document.body.classList.remove('wrong-answer');
        }, 500);
      }

      // Обновляем статистику на экране
      document.getElementById('total-count').textContent = scoreTotal;
      document.getElementById('correct-count').textContent = scoreCorrect;

      // Переходим к следующему элементу умной очереди
      generateQuestion();
    }

    // Запускаем сразу при загрузке страницы!
    window.onload = initTrainer;
  </script>
</body>
</html>
