<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивные тесты за 2 класс</title>
    <style>
        :root {
            --soft-pink: #fff0f3;
            --soft-purple: #f3f0ff;
            --accent-color: #008080;
            --deep-accent: #800000;
            --text-main: #4a4a4a;
            --white: #ffffff;
            --button-grad: linear-gradient(to top, #800000 0%, #d63031 100%);
            --grey-light: #f8f9fa;
            --grey-border: #e9ecef;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--soft-purple);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--soft-pink);
        }

        h1 {
            color: var(--deep-accent);
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        h2 {
            color: var(--accent-color);
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        p.subtitle {
            color: #777;
            font-size: 16px;
        }

        .subject-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .nav-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        .test-section {
            display: none;
        }

        .test-section.active {
            display: block;
        }

        .question-card {
            background: var(--grey-light);
            border: 1px solid var(--grey-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2d3748;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: var(--white);
            border: 1px solid var(--grey-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .option-label:hover {
            background: var(--soft-pink);
            border-color: #ffcbd1;
        }

        .option-label input {
            margin-right: 12px;
            accent-color: var(--accent-color);
            width: 18px;
            height: 18px;
        }

        .option-label.selected {
            border-color: var(--accent-color);
            background: #e6f2f2;
        }

        .submit-container {
            text-align: center;
            margin-top: 30px;
        }

        .main-button {
            background: var(--button-grad);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(128, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .main-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(128, 0, 0, 0.3);
        }

        .results-section {
            display: none;
            background: var(--white);
        }

        .grade-box {
            text-align: center;
            padding: 30px;
            background: var(--soft-pink);
            border-radius: 15px;
            margin-bottom: 35px;
            border: 2px dashed var(--deep-accent);
        }

        .grade-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .grade-value {
            font-size: 64px;
            font-weight: 900;
            color: var(--deep-accent);
            margin: 15px 0;
        }

        .report-section {
            margin-top: 30px;
        }

        .report-item {
            border-bottom: 1px solid var(--grey-border);
            padding: 15px 0;
            margin-bottom: 10px;
            padding-left: 15px;
            border-radius: 0 8px 8px 0;
        }

        .report-item.wrong {
            border-left: 4px solid var(--deep-accent);
            background: #fff8f8;
        }

        .report-item.correct {
            border-left: 4px solid var(--accent-color);
            background: #f4faf6;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .badge.wrong { background: #ffe3e3; color: var(--deep-accent); }
        .badge.correct { background: #d1ebd9; color: var(--accent-color); }

        .recommendation-box {
            background: #f0f7f7;
            border-left: 5px solid var(--accent-color);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin-top: 30px;
        }

        .recommendation-box h3 {
            margin-top: 0;
            color: var(--accent-color);
        }

        .recommendation-list {
            padding-left: 20px;
            margin-bottom: 0;
        }

        .recommendation-list li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Итоговое тестирование за курс 2 класса</h1>
    </header>

    <div class="subject-selector" id="selectors">
        <button class="nav-btn active" onclick="switchSubject('math')">Математика</button>
        <button class="nav-btn" onclick="switchSubject('russian')">Русский язык</button>
        <button class="nav-btn" onclick="switchSubject('world')">Окружающий мир</button>
    </div>

    <div id="math-test" class="test-section active">
        <form id="math-form">
            <div class="questions-container" id="math-questions"></div>
            <div class="submit-container">
                <button type="button" class="main-button" onclick="calculateResult('math')">Завершить тест по математике</button>
            </div>
        </form>
    </div>

    <div id="russian-test" class="test-section">
        <form id="russian-form">
            <div class="questions-container" id="russian-questions"></div>
            <div class="submit-container">
                <button type="button" class="main-button" onclick="calculateResult('russian')">Завершить тест по русскому языку</button>
            </div>
        </form>
    </div>

    <div id="world-test" class="test-section">
        <form id="world-form">
            <div class="questions-container" id="world-questions"></div>
            <div class="submit-container">
                <button type="button" class="main-button" onclick="calculateResult('world')">Завершить тест по окружающему миру</button>
            </div>
        </form>
    </div>

    <div id="results-block" class="results-section">
        <div class="grade-box">
            <div class="grade-title" id="grade-title">Твоя оценка по предмету</div>
            <div class="grade-value" id="grade-value">5</div>
            <div id="percentage-value" style="font-weight: 600; color: var(--text-main);">Правильных ответов: 95% (19 из 20)</div>
        </div>

        <div class="recommendation-box" id="recommendation-box">
            <h3>Рекомендации по повторению тем:</h3>
            <ul class="recommendation-list" id="recommendation-list"></ul>
        </div>

        <div class="report-section">
            <h3>Подробный отчет по каждому вопросу:</h3>
            <div id="detailed-report"></div>
        </div>

        <div class="submit-container" style="margin-top: 40px;">
            <button class="main-button" onclick="resetCurrentTest()">Пройти тест заново</button>
        </div>
    </div>
</div>

<script>
    const database = {
        math: [
            { id: 1, topic: "Текстовые задачи в 2 действия (нахождение остатка)", q: "В школьный буфет привезли 45 кг яблок. В первый день продали 15 кг, а во второй день — 13 кг. Сколько килограммов яблок осталось в буфете?", o: ["17 кг", "28 кг", "27 кг"], a: 0 },
            { id: 2, topic: "Текстовые задачи в 2 действия (сумма)", q: "На одной полке стоит 18 книг, на второй — на 5 книг меньше, чем на первой, а на третьей — 10 книг. Сколько всего книг на трёх полках?", o: ["33 книги", "41 книга", "23 книги"], a: 1 },
            { id: 3, topic: "Текстовые задачи в 2 действия (разностное сравнение)", q: "У Саши было 50 рублей. Он купил блокнот за 22 рубля и ручку за 15 рублей. На сколько рублей больше у него осталось, чем он потратил на ручку?", o: ["На 2 рублей", "На 13 рублей", "На 28 рублей"], a: 0 },
            { id: 4, topic: "Сложение и вычитание в пределах 100 с переходом через разряд", q: "Найди значение числового выражения: 72 - (36 + 9)", o: ["45", "27", "37"], a: 1 },
            { id: 5, topic: "Сравнение числовых выражений", q: "Какой знак нужно поставить вместо многоточия: 43 + 28 ... 91 - 19 ?", o: ["<", ">", "="], a: 0 },
            { id: 6, topic: "Умножение и деление, связь действий", q: "Какое число нужно вставить, чтобы равенство стало верным: 3 * ... = 27?", o: ["7", "8", "9"], a: 2 },
            { id: 7, topic: "Табличное умножение и деление", q: "Вычисли: 24 : 3 + 15", o: ["23", "21", "22"], a: 0 },
            { id: 8, topic: "Нахождение неизвестного компонента (уравнение)", q: "Реши уравнение и найди Х: 64 - Х = 28", o: ["36", "46", "92"], a: 0 },
            { id: 9, topic: "Периметр сложных фигур в 2 действия", q: "Периметр треугольника равен 25 см. Одна его сторона равна 8 см, вторая — 9 см. Найди длину третьей стороны треугольника.", o: ["17 см", "8 см", "9 см"], a: 1 },
            { id: 10, topic: "Соотношение единиц длины (перевод)", q: "Вырази и посчитай: 5 дм 3 см - 24 см. Сколько сантиметров получится?", o: ["31 см", "29 см", "39 см"], a: 1 },
            { id: 11, topic: "Порядок действий в сложных выражениях", q: "Укажи правильный порядок действий для вычисления выражения: 80 - 4 * 2 + 16 : 2", o: ["Вычитание, умножение, деление, сложение", "Умножение, деление, вычитание, сложение", "Умножение, вычитание, деление, сложение"], a: 1 },
            { id: 12, topic: "Разрядный состав и округление", q: "Какое число меньше 8 десятков на 3 единицы?", o: ["83", "77", "50"], a: 1 },
            { id: 13, topic: "Задачи на увеличение/уменьшение в несколько раз", q: "На столе лежало 4 красных карандаша, а простых — в 3 раза больше. Сколько ВСЕГО карандашей лежало на столе?", o: ["12 карандашей", "16 карандашей", "7 карандашей"], a: 1 },
            { id: 14, topic: "Единицы времени и логика", q: "Уроки начались в 8 часов утра и закончились через 4 часа. В каком часу закончились уроки?", o: ["В 12 часов дня", "В 2 часа дня", "В 14 часов"], a: 0 },
            { id: 15, topic: "Длина ломаной линии", q: "Ломаная линия состоит из трёх звеньев. Первое звено — 5 см, второе — в 2 раза длиннее первого, а третье — 3 см. Какова общая длина ломаной?", o: ["10 см", "13 см", "18 см"], a: 2 },
            { id: 16, topic: "Задачи на деление по содержанию", q: "18 тетрадей раздали ученикам, по 2 тетради каждому. Сколько учеников получили тетради?", o: ["9 учеников", "16 учеников", "8 учеников"], a: 0 },
            { id: 17, topic: "Свойства уравнений (сложное сложение)", q: "Найди корень уравнения: Х + 12 = 40 - 8", o: ["20", "36", "32"], a: 0 },
            { id: 18, topic: "Буквенные выражения", q: "Найди значение выражение а - 15, если а = 42:", o: ["37", "27", "57"], a: 1 },
            { id: 19, topic: "Геометрия: черчение и свойства", q: "Ширина прямоугольника 3 см, а длина на 2 см больше. Чему равен периметр этого прямоугольника?", o: ["10 см", "16 см", "14 см"], a: 1 },
            { id: 20, topic: "Логические задачи повышенной сложности", q: "В корзине и в пакете было поровну конфет. Из корзины в пакет переложили 4 конфеты. На сколько теперь конфет в пакете больше, чем в корзине?", o: ["На 4 конфеты", "На 8 конфет", "Осталось поровну"], a: 1 }
        ],
        russian: [
            { id: 1, topic: "Грамматическая основа предложения", q: "Найди подлежащее и сказуемое в предложении: 'Осенний сильный ветер срывал сухие листья с берёз.'", o: ["Сильный ветер", "Ветер срывал", "Срывал листья"], a: 1 },
            { id: 2, topic: "Разделительный мягкий знак (Ь)", q: "В каком слове пишется РАЗДЕЛИТЕЛЬНЫЙ мягкий знак?", o: ["Пальто", "Мальчик", "Вьюга"], a: 2 },
            { id: 3, topic: "Правила переноса слов с буквами Й и Ь", q: "Укажи строку, где слово разделено для переноса НЕВЕРНО:", o: ["Май-ка", "Конь-ки", "Па-льто"], a: 2 },
            { id: 4, topic: "Безударные гласные, проверяемые ударением", q: "В каком ряду во всех словах на месте пропуска пишется буква О?", o: ["Тр..ва, м..ря, г..ра", "К..са, н..ра, д..жди", "С..ва, стр..ла, в..да"], a: 1 },
            { id: 5, topic: "Парные согласные на конце и в корне слова", q: "Укажи слово, в котором написание пропущенной согласной буквы проверено НЕВЕРНО:", o: ["Сказка — сказочка", "Мороз — морозы", "Труд — трудный"], a: 2 },
            { id: 6, topic: "Родственные и однокоренные слова", q: "Какое слово НЕ является однокоренным к остальным?", o: ["Гора", "Горный", "Горевать"], a: 2 },
            { id: 7, topic: "Части речи: Имя существительное", q: "Какое из этих существительных является ОДУШЕВЛЕННЫМ?", o: ["Кукла", "Робот", "Пчела"], a: 2 },
            { id: 8, topic: "Части речи: Глагол", q: "Какое слово является глаголом во множественном числе?", o: ["Бежит", "Поют", "Красивые"], a: 1 },
            { id: 9, topic: "Части речи: Имя прилагательное", q: "Какое имя прилагательное связано со словом СРЕДНЕГО рода?", o: ["Яркое солнце", "Весенний день", "Зелёная трава"], a: 0 },
            { id: 10, topic: "Слова с непроверяемыми написаниями (Словарные)", q: "В каком словарном слове допущена ошибка?", o: ["Воробей", "Товарищ", "Карандаш"], a: 1 },
            { id: 11, topic: "Звуко-буквенный анализ", q: "В каком слове букв МЕНЬШЕ, чем звуков?", o: ["Ягода", "День", "Тетрадь"], a: 0 },
            { id: 12, topic: "Правописание ЖИ-ШИ, ЧА-ЩА, ЧУ-ЩУ", q: "Укажи строчку, где во всех словах пропущена буква И:", o: ["Пруж..на, кувш..н, маш..на", "Ч..лок, ж..знь, ш..шка", "Малыш.. , ч..до, пуш..нка"], a: 0 },
            { id: 13, topic: "Собственные и нарицательные имена", q: "Какое слово в предложении нужно написать с заглавной буквы: 'Летом мальчик илья васильев отдыхал в деревне орловка.'?", o: ["Только Илья", "Илья, Васильев, Орловка", "Лето, Илья, Васильев"], a: 1 },
            { id: 14, topic: "Различение предлогов и приставок", q: "Укажи верное раздельное написание предлога со словом:", o: ["(по)бежал по тропинке", "(в)летел в окно", "(на)писал на доске"], a: 0 },
            { id: 15, topic: "Алфавитный порядок", q: "В каком ряду слова расположены строго по алфавиту?", o: ["Арбуз, Волк, Гусь, Медведь", "Бабочка, Воробей, Ветер, Заяц", "Книга, Лимон, Ножницы, Малина"], a: 0 },
            { id: 16, topic: "Типы предложений по цели высказывания", q: "Каким по цели высказывания является предложение: 'Ребята, закройте, пожалуйста, книги.'?", o: ["Повествовательное", "Вопросительное", "Побудительное"], a: 2 },
            { id: 17, topic: "Лексика: Многозначные слова", q: "Какое слово имеет несколько разных значений (является многозначным)?", o: ["Тетрадь", "Ключ", "Карандаш"], a: 1 },
            { id: 18, topic: "Синонимы и контекст", q: "Подбери синоним к слову 'смелый' в словосочетании 'смелый воин':", o: ["Трусливый", "Храбрый", "Большой"], a: 1 },
            { id: 19, topic: "Правописание ЧК-ЧН", q: "Укажи слово, написано БЕЗ ошибок:", o: ["Речка", "Ночька", "Птенчик"], a: 0 },
            { id: 20, topic: "Ударение в словах", q: "В каком слове ударение падает на ВТОРОЙ слог?", o: ["Алфавит", "Портфель", "Магазин"], a: 1 }
        ],
        world: [
            { id: 1, topic: "Свойства неживой природы (воздух и вода)", q: "Какое свойство чистой воды указано НЕВЕРНО?", o: ["Прозрачная", "Имеет белый цвет", "Не имеет запаха"], a: 1 },
            { id: 2, topic: "Дикорастущие и культурные растения", q: "Какое из этих растений является хвойным дикорастущим?", o: ["Берёза", "Лиственница", "Яблоня"], a: 1 },
            { id: 3, topic: "Разнообразие животных (насекомые)", q: "Какое животное НЕ является насекомым?", o: ["Муравей", "Паук", "Шмель"], a: 1 },
            { id: 4, topic: "Дикие и домашние животные, их польза", q: "Какое домашнее животное даёт человеку шерсть и мясо?", o: ["Лошадь", "Овца", "Курица"], a: 1 },
            { id: 5, topic: "Строение тела человека (органы)", q: "Какой внутренний орган человека называют 'главным двигателем крови'?", o: ["Легкие", "Желудок", "Сердце"], a: 2 },
            { id: 6, topic: "Правила безопасного поведения в быту", q: "Что нужно сделать в первую очередь, если в квартире запахло газом?", o: ["Включить свет и проверить плиту", "Открыть окна и вызвать службу газа 104", "Спрятаться в комнате"], a: 1 },
            { id: 7, topic: "Ориентирование на местности", q: "С какой стороны ствола отдельно стоящего дерева обычно растёт мох?", o: ["С южной", "С северной", "С восточной"], a: 1 },
            { id: 8, topic: "Формы земной поверхности", q: "Как называется глубокая впадина на равнине с крутыми осыпающимися склонами?", o: ["Холм", "Овраг", "Гора"], a: 1 },
            { id: 9, topic: "Водные объекты", q: "Где на Земле сосредоточена основная масса СОЛЁНОЙ воды?", o: ["В реках и озёрах", "В океанах и морях", "В родниках"], a: 1 },
            { id: 10, topic: "Красная книга и охрана природы", q: "Для чего создана Красная книга?", o: ["Чтобы записывать красивые виды природы", "Чтобы спасти исчезающие виды растений и животных", "Чтобы учить правила поведения в лесу"], a: 1 },
            { id: 11, topic: "Государственная символика России", q: "Что изображено в центре Государственного герба Российской Федерации?", o: ["Двуглавый орёл", "Белый медведь", "Золотой лев"], a: 0 },
            { id: 12, topic: "Взаимосвязи в природе (сезонные изменения)", q: "Какая основная причина того, что перелётные птицы осенью улетают на юг?", o: ["Становится слишком темно", "Исчезает корм (насекомые)", "Им нравится летать"], a: 1 },
            { id: 13, topic: "Экология и правила поведения в лесу", q: "Какое действие человека наносит вред природе леса?", o: ["Сбор сухих веток", "Оставление разведенного костра", "Фотографирование птиц"], a: 1 },
            { id: 14, topic: "Профессии и экономика", q: "Какая отрасль экономики занимается строительством жилых домов и школ?", o: ["Промышленность", "Транспорт", "Строительство"], a: 2 },
            { id: 15, topic: "Правила дорожного движения (Пешеходы)", q: "Где пешеход имеет право переходить дорогу загородного шоссе, если нет перехода?", o: ["В любом месте, где нет машин", "На повороте дороги", "На прямом участке, где дорога хорошо видна в обе стороны"], a: 2 },
            { id: 16, topic: "Явления природы (Термометр)", q: "Какую температуру показывает термометр, если столбик ртути стоит выше нуля на 5 делений?", o: ["Пять градусов мороза (-5)", "Пять градусов тепла (+5)", "Ноль градусов"], a: 1 },
            { id: 17, topic: "Группы растений (Кустарники)", q: "Какое растение относится к группе кустарников?", o: ["Одуванчик", "Сирень", "Дуб"], a: 1 },
            { id: 18, topic: "Группы животных (Земноводные)", q: "Какое животное относится к земноводным (амфибиям)?", o: ["Ящерица", "Жаба", "Карась"], a: 1 },
            { id: 19, topic: "Семья и родословная", q: "Кем ты приходишься родителям своих родителей (бабушке и дедушке)?", o: ["Сыном или дочерью", "Внуком или внучкой", "Племянником"], a: 1 },
            { id: 20, topic: "Наша страна (Народы России)", q: "Какое утверждение о народах России является верным?", o: ["В России живёт только один народ", "Россия — многонациональное государство, где все народы равны", "Каждый народ должен жить отдельно"], a: 1 }
        ]
    };

    let currentSubject = 'math';

    function initTests() {
        for (const [subject, questions] of Object.entries(database)) {
            const container = document.getElementById(`${subject}-questions`);
            container.innerHTML = '';
            
            questions.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `${index + 1}. ${item.q}`;
                card.appendChild(qText);
                
                const optionsList = document.createElement('div');
                optionsList.className = 'options-list';
                
                item.o.forEach((option, oIdx) => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = `label-${subject}-${item.id}-${oIdx}`;
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `question-${subject}-${item.id}`;
                    radio.value = oIdx;
                    radio.onclick = function() {
                        item.o.forEach((_, idx) => {
                            document.getElementById(`label-${subject}-${item.id}-${idx}`).classList.remove('selected');
                        });
                        label.classList.add('selected');
                    };
                    
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(option));
                    optionsList.appendChild(label);
                });
                
                card.appendChild(optionsList);
                container.appendChild(card);
            });
        }
    }

    function switchSubject(subject) {
        currentSubject = subject;
        document.querySelectorAll('.test-section').forEach(el => el.classList.remove('active'));
        document.getElementById('results-block').style.display = 'none';
        document.getElementById(`${subject}-test`).classList.add('active');
        
        const buttons = document.getElementById('selectors').getElementsByTagName('button');
        buttons[0].className = `nav-btn ${subject === 'math' ? 'active' : ''}`;
        buttons[1].className = `nav-btn ${subject === 'russian' ? 'active' : ''}`;
        buttons[2].className = `nav-btn ${subject === 'world' ? 'active' : ''}`;
        document.getElementById('selectors').style.display = 'flex';
    }

    function calculateResult(subject) {
        const questions = database[subject];
        const form = document.getElementById(`${subject}-form`);
        let correctCount = 0;
        let detailedReportHtml = '';
        let wrongTopics = new Set();
        
        questions.forEach((item, index) => {
            const selectedRadio = form.querySelector(`input[name="question-${subject}-${item.id}"]:checked`);
            const userAnswer = selectedRadio ? parseInt(selectedRadio.value) : null;
            const isCorrect = userAnswer === item.a;
            
            if (isCorrect) {
                correctCount++;
                detailedReportHtml += `
                    <div class="report-item correct">
                        <span class="badge correct">Верно</span>
                        <div class="question-text">${index + 1}. ${item.q}</div>
                        <p>Ответ: <b>${item.o[userAnswer]}</b></p>
                        <p style="font-size: 14px; color: #666;">Тема: ${item.topic}</p>
                    </div>
                `;
            } else {
                wrongTopics.add(item.topic);
                const answerText = userAnswer !== null ? item.o[userAnswer] : "Ответ не выбран";
                detailedReportHtml += `
                    <div class="report-item wrong">
                        <span class="badge wrong">Ошибка</span>
                        <div class="question-text">${index + 1}. ${item.q}</div>
                        <p>Выбранный ответ: <span style="color: var(--deep-accent); font-weight: 600;">${answerText}</span></p>
                        <p>Правильный ответ: <span style="color: var(--accent-color); font-weight: 600;">${item.o[item.a]}</span></p>
                        <p style="font-size: 14px; color: #666;">Тема: ${item.topic}</p>
                    </div>
                `;
            }
        });
        
        const totalQuestions = questions.length;
        const percentage = Math.round((correctCount / totalQuestions) * 100);
        let grade = 2;
        
        if (percentage > 65) grade = 5;
        else if (percentage >= 51) grade = 4;
        else if (percentage >= 35) grade = 3;
        else grade = 2;
        
        document.getElementById(`${subject}-test`).classList.remove('active');
        document.getElementById('selectors').style.display = 'none';
        
        const resultsBlock = document.getElementById('results-block');
        resultsBlock.style.display = 'block';
        
        let subjName = subject === 'math' ? 'Математике' : subject === 'russian' ? 'Русскому языку' : 'Окружающему миру';
        document.getElementById('grade-title').innerText = `Твоя итоговая оценка по ${subjName}:`;
        document.getElementById('grade-value').innerText = grade;
        document.getElementById('percentage-value').innerText = `Правильных ответов: ${percentage}% (${correctCount} из ${totalQuestions})`;
        
        const recList = document.getElementById('recommendation-list');
        recList.innerHTML = '';
        
        if (wrongTopics.size === 0) {
            const li = document.createElement('li');
            li.innerHTML = '<b>Великолепный результат!</b> Ошибок нет. Весь курс усвоен на отлично!';
            recList.appendChild(li);
        } else {
            wrongTopics.forEach(topic => {
                const li = document.createElement('li');
                li.innerHTML = `Стоит обратить внимание на тему: <b>«${topic}»</b>`;
                recList.appendChild(li);
            });
        }
        
        document.getElementById('detailed-report').innerHTML = detailedReportHtml;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetCurrentTest() {
        document.getElementById(`${currentSubject}-form`).reset();
        document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
        switchSubject(currentSubject);
    }

    window.onload = initTests;
</script>
</body>
</html>
